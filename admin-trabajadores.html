<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Administración — Trabajadores</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #1a1a2e;
    --mid: #16213e;
    --accent: #e94560;
    --amber: #f5a623;
    --green: #4caf7d;
    --cream: #f8f8f8;
    --white: #ffffff;
    --text: #2c2c3e;
    --text-mid: #666680;
    --border: #e0e0f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; color: var(--text); }

  /* LOGIN */
  .login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: var(--dark);
    background-image: radial-gradient(circle at 30% 50%, rgba(233,69,96,0.15) 0%, transparent 50%),
                      radial-gradient(circle at 70% 50%, rgba(245,166,35,0.1) 0%, transparent 50%);
  }
  .login-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 2.5rem;
    width: 90%; max-width: 360px;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .login-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .login-box h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 0.08em;
    color: white; margin-bottom: 0.3rem;
  }
  .login-box p { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 1.5rem; }
  .login-input {
    width: 100%; padding: 0.85rem 1rem;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: white; font-family: 'DM Sans', sans-serif; font-size: 1rem;
    outline: none; margin-bottom: 1rem; text-align: center; letter-spacing: 0.2em;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; padding: 0.85rem;
    background: var(--accent); color: white; border: none; border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.2s;
  }
  .login-btn:hover { background: #c73652; transform: translateY(-1px); }
  .login-error { color: var(--accent); font-size: 0.82rem; margin-top: 0.5rem; display: none; }

  /* PANEL */
  .panel { display: none; }
  .panel.show { display: block; }

  .header {
    background: var(--dark);
    padding: 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .header-tag {
    background: var(--accent); color: white;
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 0.25rem 0.6rem; border-radius: 20px;
  }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem; letter-spacing: 0.06em; color: white;
  }
  .btn-logout {
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    padding: 0.4rem 0.8rem; font-size: 0.8rem; cursor: pointer;
    transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.2); color: white; }

  .content { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
  .stat-card {
    background: white; border-radius: 12px; padding: 1rem 1.2rem;
    border: 1px solid var(--border); text-align: center;
  }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.05em; }
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--accent); }
  .stat-num.amber { color: var(--amber); }
  .stat-label { font-size: 0.72rem; color: var(--text-mid); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }

  /* Add form */
  .card {
    background: white; border-radius: 16px; padding: 1.5rem;
    border: 1px solid var(--border); margin-bottom: 1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .card-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
    letter-spacing: 0.08em; color: var(--text); margin-bottom: 1rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.75rem; align-items: end; }
  .field-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .field-group label {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text-mid);
  }
  .field-group input {
    padding: 0.65rem 0.9rem;
    border: 1.5px solid var(--border); border-radius: 9px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s;
  }
  .field-group input:focus { border-color: var(--accent); }
  .btn-add {
    padding: 0.65rem 1.2rem;
    background: var(--dark); color: white; border: none; border-radius: 9px;
    font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 0.08em;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .btn-add:hover { background: var(--accent); }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Worker list */
  .search-box {
    width: 100%; padding: 0.65rem 1rem;
    border: 1.5px solid var(--border); border-radius: 9px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    outline: none; margin-bottom: 0.75rem;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }

  .worker-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .worker-item:last-child { border-bottom: none; }
  .worker-item:hover { background: var(--cream); }
  .worker-info { display: flex; align-items: center; gap: 0.75rem; }
  .worker-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.85rem; color: white; flex-shrink: 0;
  }
  .worker-name { font-weight: 600; font-size: 0.92rem; }
  .worker-dates { font-size: 0.75rem; color: var(--text-mid); }
  .badge {
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 20px;
  }
  .badge.active { background: #e8f8ef; color: var(--green); }
  .badge.inactive { background: #ffeef0; color: var(--accent); }

  .btn-baja {
    padding: 0.3rem 0.7rem;
    background: transparent; border: 1.5px solid var(--accent); color: var(--accent);
    border-radius: 7px; font-size: 0.75rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s; margin-left: 0.5rem;
  }
  .btn-baja:hover { background: var(--accent); color: white; }
  .btn-reactivar {
    padding: 0.3rem 0.7rem;
    background: transparent; border: 1.5px solid var(--green); color: var(--green);
    border-radius: 7px; font-size: 0.75rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s; margin-left: 0.5rem;
  }
  .btn-reactivar:hover { background: var(--green); color: white; }

  .loading { text-align: center; padding: 2rem; color: var(--text-mid); font-size: 0.9rem; }
  .empty { text-align: center; padding: 2rem; color: var(--text-mid); font-size: 0.9rem; }

  .msg {
    padding: 0.75rem 1rem; border-radius: 9px; font-size: 0.85rem;
    margin-bottom: 1rem; display: none;
  }
  .msg.success { background: #e8f8ef; color: #2d7a4f; border: 1px solid #b8e8ce; }
  .msg.error { background: #ffeef0; color: #c0392b; border: 1px solid #ffcdd2; }
  .msg.show { display: block; }

  @media (max-width: 500px) {
    .form-row { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <h1>Panel Admin</h1>
    <p>Agroinver Zapata — Control de Jornada</p>
    <input type="password" class="login-input" id="passwordInput" placeholder="••••••" maxlength="20">
    <button class="login-btn" onclick="checkPassword()">Entrar</button>
    <div class="login-error" id="loginError">Contraseña incorrecta</div>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="header">
    <div class="header-left">
      <div>
        <div class="header-tag">⚙️ Admin</div>
        <h1>Panel de Administración</h1>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>

  <!-- TABS -->
  <div style="display:flex;background:white;border-bottom:2px solid var(--border);padding:0 1.5rem">
    <div id="tab-trabajadores-btn" style="padding:0.9rem 1.2rem;font-weight:600;font-size:0.88rem;cursor:pointer;border-bottom:3px solid var(--accent);margin-bottom:-2px;color:var(--accent)" onclick="switchTab('trabajadores')">👥 Trabajadores</div>
    <div id="tab-tareas-btn" style="padding:0.9rem 1.2rem;font-weight:600;font-size:0.88rem;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--text-mid)" onclick="switchTab('tareas')">📋 Tareas</div>
  </div>

  <!-- TAB TRABAJADORES -->
  <div id="tab-trabajadores" class="content">
    <div class="stats">
      <div class="stat-card"><div class="stat-num green" id="stat-activos">—</div><div class="stat-label">Activos</div></div>
      <div class="stat-card"><div class="stat-num red" id="stat-bajas">—</div><div class="stat-label">Bajas</div></div>
      <div class="stat-card"><div class="stat-num amber" id="stat-total">—</div><div class="stat-label">Total</div></div>
    </div>
    <div class="msg" id="msg"></div>
    <div class="card">
      <div class="card-title">➕ Añadir trabajador</div>
      <div class="form-row">
        <div class="field-group"><label>Nombre completo</label><input type="text" id="newNombre" placeholder="Nombre..."></div>
        <div class="field-group"><label>Fecha de alta</label><input type="date" id="newFechaAlta"></div>
        <button class="btn-add" id="btnAdd" onclick="addTrabajador()">+ Añadir</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">👥 Trabajadores</div>
      <input type="text" class="search-box" id="searchBox" placeholder="Buscar trabajador..." oninput="filterWorkers()">
      <div id="workerList"><div class="loading">Cargando...</div></div>
    </div>
  </div>

  <!-- TAB TAREAS -->
  <div id="tab-tareas" class="content" style="display:none">
    <div class="stats">
      <div class="stat-card"><div class="stat-num green" id="stat-tareas-activas">—</div><div class="stat-label">Activas</div></div>
      <div class="stat-card"><div class="stat-num red" id="stat-tareas-inactivas">—</div><div class="stat-label">Inactivas</div></div>
      <div class="stat-card"><div class="stat-num amber" id="stat-tareas-total">—</div><div class="stat-label">Total</div></div>
    </div>
    <div class="msg" id="msg-tareas"></div>
    <div class="card">
      <div class="card-title">➕ Nueva tarea</div>
      <div class="form-row">
        <div class="field-group"><label>Nombre de la tarea</label><input type="text" id="newTarea" placeholder="Nombre de la tarea..."></div>
        <button class="btn-add" id="btnAddTarea" onclick="addTarea()">+ Añadir</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📋 Tareas del parte de jornada</div>
      <input type="text" class="search-box" id="searchTareas" placeholder="Buscar tarea..." oninput="filterTareas()">
      <div id="tareasList"><div class="loading">Cargando...</div></div>
    </div>
  </div>

<script>
const SUPABASE_URL = 'https://jecqfntpvzwipjcleqbl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplY3FmbnRwdnp3aXBqY2xlcWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzE2NjIsImV4cCI6MjA5MDQ0NzY2Mn0.J26k1VElLscwOxhGTBXpyw-OnXZ-BZOiBW5vCG3CreI';
const PASSWORD = 'agroinver2026';

let allWorkers = [];
let allTareas = [];

// ── LOGIN ──
function checkPassword() {
  const val = document.getElementById('passwordInput').value;
  if (val === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('panel').classList.add('show');
    loadWorkers();
    loadTareas();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('passwordInput').value = '';
  }
}

document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('panel').classList.remove('show');
  document.getElementById('passwordInput').value = '';
}

// ── TABS ──
function switchTab(tab) {
  document.getElementById('tab-trabajadores').style.display = tab === 'trabajadores' ? 'block' : 'none';
  document.getElementById('tab-tareas').style.display = tab === 'tareas' ? 'block' : 'none';
  document.getElementById('tab-trabajadores-btn').style.cssText = tab === 'trabajadores'
    ? 'padding:0.9rem 1.2rem;font-weight:600;font-size:0.88rem;cursor:pointer;border-bottom:3px solid var(--accent);margin-bottom:-2px;color:var(--accent)'
    : 'padding:0.9rem 1.2rem;font-weight:600;font-size:0.88rem;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--text-mid)';
  document.getElementById('tab-tareas-btn').style.cssText = tab === 'tareas'
    ? 'padding:0.9rem 1.2rem;font-weight:600;font-size:0.88rem;cursor:pointer;border-bottom:3px solid var(--accent);margin-bottom:-2px;color:var(--accent)'
    : 'padding:0.9rem 1.2rem;font-weight:600;font-size:0.88rem;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--text-mid)';
}

// ── SUPABASE ──
async function sbFetch(endpoint, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...options.headers
    }
  });
  return res;
}

// ── LOAD WORKERS ──
async function loadWorkers() {
  try {
    const res = await sbFetch('trabajadores?order=fecha_baja.asc.nullsfirst,nombre.asc&select=*');
    allWorkers = await res.json();
    renderWorkers(allWorkers);
    updateStats();
  } catch(e) {
    showMsg('Error cargando trabajadores', 'error');
  }
}

function updateStats() {
  const hoy = new Date();
  const activos = allWorkers.filter(t => !t.fecha_baja || new Date(t.fecha_baja) >= hoy).length;
  const bajas = allWorkers.length - activos;
  document.getElementById('stat-activos').textContent = activos;
  document.getElementById('stat-bajas').textContent = bajas;
  document.getElementById('stat-total').textContent = allWorkers.length;
}

function getColor(name) {
  const colors = ['#e94560','#f5a623','#4caf7d','#2196f3','#9c27b0','#ff5722','#00bcd4','#8bc34a'];
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

function renderWorkers(workers) {
  const list = document.getElementById('workerList');
  if (!workers.length) { list.innerHTML = '<div class="empty">No hay trabajadores</div>'; return; }

  const hoy = new Date();
  list.innerHTML = workers.map(t => {
    const activo = !t.fecha_baja || new Date(t.fecha_baja) >= hoy;
    const initials = t.nombre.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const alta = t.fecha_alta ? new Date(t.fecha_alta).toLocaleDateString('es-ES') : '—';
    const baja = t.fecha_baja ? new Date(t.fecha_baja).toLocaleDateString('es-ES') : '—';

    return `<div class="worker-item">
      <div class="worker-info">
        <div class="worker-avatar" style="background:${getColor(t.nombre)}">${initials}</div>
        <div>
          <div class="worker-name">${t.nombre}</div>
          <div class="worker-dates">Alta: ${alta}${t.fecha_baja ? ' · Baja: ' + baja : ''}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:0.3rem">
        <span class="badge ${activo ? 'active' : 'inactive'}">${activo ? '✅ Activo' : '❌ Baja'}</span>
        ${activo
          ? `<button class="btn-baja" onclick="darDeBaja('${t.id}', '${t.nombre}')">Dar de baja</button>`
          : `<button class="btn-reactivar" onclick="reactivar('${t.id}', '${t.nombre}')">Reactivar</button>`
        }
      </div>
    </div>`;
  }).join('');
}

function filterWorkers() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  renderWorkers(allWorkers.filter(t => t.nombre.toLowerCase().includes(q)));
}

// ── ADD WORKER ──
async function addTrabajador() {
  const nombre = document.getElementById('newNombre').value.trim();
  const fechaAlta = document.getElementById('newFechaAlta').value;

  if (!nombre) { showMsg('Introduce el nombre del trabajador', 'error'); return; }
  if (!fechaAlta) { showMsg('Introduce la fecha de alta', 'error'); return; }

  const btn = document.getElementById('btnAdd');
  btn.disabled = true; btn.textContent = 'Añadiendo...';

  try {
    const res = await sbFetch('trabajadores', {
      method: 'POST',
      body: JSON.stringify({ nombre, fecha_alta: fechaAlta })
    });
    if (!res.ok) throw new Error('Error al añadir');
    showMsg('msg', `✅ ${nombre} añadido correctamente`, 'success');
    document.getElementById('newNombre').value = '';
    document.getElementById('newFechaAlta').value = '';
    await loadWorkers();
  } catch(e) {
    showMsg('msg', 'Error al añadir trabajador', 'error');
  }
  btn.disabled = false; btn.textContent = '+ Añadir';
}

// ── BAJA ──
async function darDeBaja(id, nombre) {
  const fecha = prompt(`Fecha de baja para ${nombre} (YYYY-MM-DD):`, new Date().toISOString().split('T')[0]);
  if (!fecha) return;
  try {
    const res = await sbFetch(`trabajadores?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ fecha_baja: fecha }) });
    if (!res.ok) throw new Error();
    showMsg('msg', `✅ ${nombre} dado de baja el ${fecha}`, 'success');
    await loadWorkers();
  } catch(e) { showMsg('msg', 'Error al dar de baja', 'error'); }
}

// ── REACTIVAR ──
async function reactivar(id, nombre) {
  if (!confirm(`¿Reactivar a ${nombre}?`)) return;
  try {
    const res = await sbFetch(`trabajadores?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ fecha_baja: null }) });
    if (!res.ok) throw new Error();
    showMsg('msg', `✅ ${nombre} reactivado correctamente`, 'success');
    await loadWorkers();
  } catch(e) { showMsg('msg', 'Error al reactivar', 'error'); }
}

// ── TAREAS ──
async function loadTareas() {
  try {
    const res = await sbFetch('tareas_trabajo?order=orden.asc,nombre.asc&select=*');
    allTareas = await res.json();
    renderTareas(allTareas);
    const activas = allTareas.filter(t => t.activa).length;
    document.getElementById('stat-tareas-activas').textContent = activas;
    document.getElementById('stat-tareas-inactivas').textContent = allTareas.length - activas;
    document.getElementById('stat-tareas-total').textContent = allTareas.length;
  } catch(e) { showMsg('msg-tareas', 'Error cargando tareas', 'error'); }
}

function renderTareas(tareas) {
  const list = document.getElementById('tareasList');
  if (!tareas.length) { list.innerHTML = '<div class="loading">No hay tareas</div>'; return; }
  list.innerHTML = tareas.map(t => `
    <div class="worker-item">
      <div class="worker-info">
        <div class="worker-avatar" style="background:${t.activa ? '#4caf7d' : '#ccc'};font-size:0.7rem">${t.activa ? '✅' : '❌'}</div>
        <div>
          <div class="worker-name">${t.nombre}</div>
          <div class="worker-dates">${t.activa ? 'Activa' : 'Inactiva'}</div>
        </div>
      </div>
      <div>
        ${t.activa
          ? `<button class="btn-baja" onclick="toggleTarea('${t.id}', false)">Desactivar</button>`
          : `<button class="btn-reactivar" onclick="toggleTarea('${t.id}', true)">Activar</button>`}
      </div>
    </div>`).join('');
}

function filterTareas() {
  const q = document.getElementById('searchTareas').value.toLowerCase();
  renderTareas(allTareas.filter(t => t.nombre.toLowerCase().includes(q)));
}

async function addTarea() {
  const nombre = document.getElementById('newTarea').value.trim();
  if (!nombre) { showMsg('msg-tareas', 'Introduce el nombre de la tarea', 'error'); return; }
  const btn = document.getElementById('btnAddTarea');
  btn.disabled = true; btn.textContent = 'Añadiendo...';
  try {
    const res = await sbFetch('tareas_trabajo', {
      method: 'POST',
      body: JSON.stringify({ nombre, orden: allTareas.length + 1, activa: true })
    });
    if (!res.ok) throw new Error();
    showMsg('msg-tareas', `✅ Tarea "${nombre}" añadida`, 'success');
    document.getElementById('newTarea').value = '';
    await loadTareas();
  } catch(e) { showMsg('msg-tareas', 'Error al añadir tarea', 'error'); }
  btn.disabled = false; btn.textContent = '+ Añadir';
}

async function toggleTarea(id, activa) {
  try {
    const res = await sbFetch(`tareas_trabajo?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ activa })
    });
    if (!res.ok) throw new Error();
    showMsg('msg-tareas', activa ? '✅ Tarea activada' : '✅ Tarea desactivada', 'success');
    await loadTareas();
  } catch(e) { showMsg('msg-tareas', 'Error al actualizar tarea', 'error'); }
}

function showMsg(id, text, type) {
  const elId = id === 'msg-tareas' ? 'msg-tareas' : 'msg';
  const el = document.getElementById(elId);
  el.textContent = text;
  el.className = `msg ${type} show`;
  setTimeout(() => el.classList.remove('show'), 4000);
}

// Set today's date as default
document.getElementById('newFechaAlta').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
