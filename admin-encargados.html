<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin — Encargados</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #1a2e1a;
    --accent: #4a8c3f;
    --amber: #f5a623;
    --red: #e94560;
    --green: #4caf7d;
    --cream: #f8f8f8;
    --white: #ffffff;
    --text: #2c2c3e;
    --text-mid: #666680;
    --border: #e0e0f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; color: var(--text); }

  /* LOGIN */
  .login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: var(--dark);
    background-image: radial-gradient(circle at 30% 50%, rgba(74,140,63,0.2) 0%, transparent 50%);
  }
  .login-box {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 2.5rem; width: 90%; max-width: 360px;
    text-align: center; backdrop-filter: blur(10px);
  }
  .login-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .login-box h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.08em; color: white; margin-bottom: 0.3rem; }
  .login-box p { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 1.5rem; }
  .login-input {
    width: 100%; padding: 0.85rem 1rem; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
    color: white; font-family: 'DM Sans', sans-serif; font-size: 1rem;
    outline: none; margin-bottom: 1rem; text-align: center; letter-spacing: 0.2em;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; padding: 0.85rem; background: var(--accent); color: white;
    border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 0.1em; cursor: pointer;
  }
  .login-btn:hover { background: #3a7a2f; }
  .login-error { color: var(--red); font-size: 0.82rem; margin-top: 0.5rem; display: none; }

  /* PANEL */
  .panel { display: none; }
  .panel.show { display: block; }

  .header {
    background: var(--dark); padding: 1.2rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.06em; color: white; }
  .header-tag { background: var(--accent); color: white; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 20px; margin-bottom: 0.2rem; display: inline-block; }
  .btn-logout { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 0.4rem 0.8rem; font-size: 0.8rem; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-logout:hover { background: rgba(255,255,255,0.2); color: white; }

  /* TABS */
  .tabs { display: flex; background: white; border-bottom: 2px solid var(--border); padding: 0 1.5rem; }
  .tab { padding: 0.9rem 1.2rem; font-weight: 600; font-size: 0.88rem; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; color: var(--text-mid); transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .content { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  /* Cards */
  .card { background: white; border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border); margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em; color: var(--text); margin-bottom: 1rem; }

  /* Form */
  .form-row { display: grid; grid-template-columns: 1fr auto; gap: 0.75rem; align-items: end; }
  .field-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .field-group label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-mid); }
  .field-group input { padding: 0.65rem 0.9rem; border: 1.5px solid var(--border); border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .field-group input:focus { border-color: var(--accent); }
  .btn-add { padding: 0.65rem 1.2rem; background: var(--dark); color: white; border: none; border-radius: 9px; font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 0.08em; cursor: pointer; white-space: nowrap; }
  .btn-add:hover { background: var(--accent); }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

  /* List items */
  .list-item { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border); }
  .list-item:last-child { border-bottom: none; }
  .list-item-name { font-weight: 600; font-size: 0.92rem; display: flex; align-items: center; gap: 0.5rem; }
  .badge { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 20px; }
  .badge.active { background: #e8f8ef; color: var(--green); }
  .badge.inactive { background: #ffeef0; color: var(--red); }

  .btn-danger { padding: 0.3rem 0.7rem; background: transparent; border: 1.5px solid var(--red); color: var(--red); border-radius: 7px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-danger:hover { background: var(--red); color: white; }
  .btn-success { padding: 0.3rem 0.7rem; background: transparent; border: 1.5px solid var(--green); color: var(--green); border-radius: 7px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-success:hover { background: var(--green); color: white; }

  .search-box { width: 100%; padding: 0.65rem 1rem; border: 1.5px solid var(--border); border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; margin-bottom: 0.75rem; }
  .search-box:focus { border-color: var(--accent); }

  .msg { padding: 0.75rem 1rem; border-radius: 9px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
  .msg.success { background: #e8f8ef; color: #2d7a4f; border: 1px solid #b8e8ce; }
  .msg.error { background: #ffeef0; color: #c0392b; border: 1px solid #ffcdd2; }
  .msg.show { display: block; }

  .loading { text-align: center; padding: 2rem; color: var(--text-mid); font-size: 0.9rem; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
  .stat-card { background: white; border-radius: 12px; padding: 1rem; border: 1px solid var(--border); text-align: center; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; }
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }
  .stat-num.amber { color: var(--amber); }
  .stat-label { font-size: 0.7rem; color: var(--text-mid); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-icon">🌿</div>
    <h1>Panel Admin</h1>
    <p>Partes de Trabajo — Encargados</p>
    <input type="password" class="login-input" id="passwordInput" placeholder="••••••">
    <button class="login-btn" onclick="checkPassword()">Entrar</button>
    <div class="login-error" id="loginError">Contraseña incorrecta</div>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="header">
    <div>
      <div class="header-tag">⚙️ Admin</div>
      <h1>Panel de Administración</h1>
    </div>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('tareas')">📋 Tareas</div>
    <div class="tab" onclick="switchTab('encargados')">👷 Encargados</div>
  </div>

  <!-- TAB TAREAS -->
  <div class="tab-content active" id="tab-tareas">
    <div class="content">
      <div class="msg" id="msg-tareas"></div>

      <div class="stats">
        <div class="stat-card"><div class="stat-num green" id="st-activas">—</div><div class="stat-label">Activas</div></div>
        <div class="stat-card"><div class="stat-num red" id="st-inactivas">—</div><div class="stat-label">Inactivas</div></div>
        <div class="stat-card"><div class="stat-num amber" id="st-total-t">—</div><div class="stat-label">Total</div></div>
      </div>

      <div class="card">
        <div class="card-title">➕ Nueva tarea</div>
        <div class="form-row">
          <div class="field-group">
            <label>Nombre de la tarea</label>
            <input type="text" id="newTarea" placeholder="Nombre de la tarea...">
          </div>
          <button class="btn-add" id="btnAddTarea" onclick="addTarea()">+ Añadir</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📋 Lista de tareas</div>
        <input type="text" class="search-box" id="searchTareas" placeholder="Buscar tarea..." oninput="filterTareas()">
        <div id="tareasList"><div class="loading">Cargando...</div></div>
      </div>
    </div>
  </div>

  <!-- TAB ENCARGADOS -->
  <div class="tab-content" id="tab-encargados">
    <div class="content">
      <div class="msg" id="msg-encargados"></div>

      <div class="stats">
        <div class="stat-card"><div class="stat-num green" id="se-activos">—</div><div class="stat-label">Activos</div></div>
        <div class="stat-card"><div class="stat-num red" id="se-inactivos">—</div><div class="stat-label">Inactivos</div></div>
        <div class="stat-card"><div class="stat-num amber" id="se-total">—</div><div class="stat-label">Total</div></div>
      </div>

      <div class="card">
        <div class="card-title">➕ Nuevo encargado</div>
        <div class="form-row">
          <div class="field-group">
            <label>Nombre del encargado</label>
            <input type="text" id="newEncargado" placeholder="Nombre...">
          </div>
          <button class="btn-add" id="btnAddEncargado" onclick="addEncargado()">+ Añadir</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">👷 Lista de encargados</div>
        <div id="encargadosList"><div class="loading">Cargando...</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jecqfntpvzwipjcleqbl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplY3FmbnRwdnp3aXBqY2xlcWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzE2NjIsImV4cCI6MjA5MDQ0NzY2Mn0.J26k1VElLscwOxhGTBXpyw-OnXZ-BZOiBW5vCG3CreI';
const PASSWORD = 'agroinver2026';

let allTareas = [];
let allEncargados = [];

// ── LOGIN ──
function checkPassword() {
  if (document.getElementById('passwordInput').value === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('panel').classList.add('show');
    loadTareas();
    loadEncargados();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('passwordInput').value = '';
  }
}
document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
function logout() { document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('panel').classList.remove('show'); }

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ── SUPABASE ──
async function sbFetch(endpoint, options = {}) {
  return fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
    ...options,
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...options.headers }
  });
}

// ── TAREAS ──
async function loadTareas() {
  const res = await sbFetch('tareas_encargados?order=orden.asc,nombre.asc&select=*');
  allTareas = await res.json();
  renderTareas(allTareas);
  const activas = allTareas.filter(t => t.activa).length;
  document.getElementById('st-activas').textContent = activas;
  document.getElementById('st-inactivas').textContent = allTareas.length - activas;
  document.getElementById('st-total-t').textContent = allTareas.length;
}

function renderTareas(tareas) {
  const list = document.getElementById('tareasList');
  if (!tareas.length) { list.innerHTML = '<div class="loading">No hay tareas</div>'; return; }
  list.innerHTML = tareas.map(t => `
    <div class="list-item">
      <div class="list-item-name">
        ${t.nombre}
        <span class="badge ${t.activa ? 'active' : 'inactive'}">${t.activa ? 'Activa' : 'Inactiva'}</span>
      </div>
      <div>
        ${t.activa
          ? `<button class="btn-danger" onclick="toggleTarea('${t.id}', false)">Desactivar</button>`
          : `<button class="btn-success" onclick="toggleTarea('${t.id}', true)">Activar</button>`
        }
      </div>
    </div>`).join('');
}

function filterTareas() {
  const q = document.getElementById('searchTareas').value.toLowerCase();
  renderTareas(allTareas.filter(t => t.nombre.toLowerCase().includes(q)));
}

async function addTarea() {
  const nombre = document.getElementById('newTarea').value.trim();
  if (!nombre) { showMsg('msg-tareas', 'Introduce el nombre de la tarea', 'error'); return; }
  const btn = document.getElementById('btnAddTarea');
  btn.disabled = true;
  const orden = allTareas.length + 1;
  const res = await sbFetch('tareas_encargados', { method: 'POST', body: JSON.stringify({ nombre, orden, activa: true }) });
  if (res.ok) { showMsg('msg-tareas', `✅ Tarea "${nombre}" añadida`, 'success'); document.getElementById('newTarea').value = ''; await loadTareas(); }
  else { showMsg('msg-tareas', 'Error al añadir tarea', 'error'); }
  btn.disabled = false;
}

async function toggleTarea(id, activa) {
  const res = await sbFetch(`tareas_encargados?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ activa }) });
  if (res.ok) { showMsg('msg-tareas', activa ? '✅ Tarea activada' : '✅ Tarea desactivada', 'success'); await loadTareas(); }
  else { showMsg('msg-tareas', 'Error al actualizar tarea', 'error'); }
}

// ── ENCARGADOS ──
async function loadEncargados() {
  const res = await sbFetch('encargados?order=nombre.asc&select=*');
  allEncargados = await res.json();
  renderEncargados(allEncargados);
  const activos = allEncargados.filter(e => e.activo).length;
  document.getElementById('se-activos').textContent = activos;
  document.getElementById('se-inactivos').textContent = allEncargados.length - activos;
  document.getElementById('se-total').textContent = allEncargados.length;
}

function renderEncargados(encargados) {
  const list = document.getElementById('encargadosList');
  if (!encargados.length) { list.innerHTML = '<div class="loading">No hay encargados</div>'; return; }
  list.innerHTML = encargados.map(e => `
    <div class="list-item">
      <div class="list-item-name">
        ${e.nombre}
        <span class="badge ${e.activo ? 'active' : 'inactive'}">${e.activo ? 'Activo' : 'Inactivo'}</span>
      </div>
      <div>
        ${e.activo
          ? `<button class="btn-danger" onclick="toggleEncargado('${e.id}', false)">Desactivar</button>`
          : `<button class="btn-success" onclick="toggleEncargado('${e.id}', true)">Activar</button>`
        }
      </div>
    </div>`).join('');
}

async function addEncargado() {
  const nombre = document.getElementById('newEncargado').value.trim().toUpperCase();
  if (!nombre) { showMsg('msg-encargados', 'Introduce el nombre del encargado', 'error'); return; }
  const btn = document.getElementById('btnAddEncargado');
  btn.disabled = true;
  const res = await sbFetch('encargados', { method: 'POST', body: JSON.stringify({ nombre, activo: true }) });
  if (res.ok) { showMsg('msg-encargados', `✅ Encargado "${nombre}" añadido`, 'success'); document.getElementById('newEncargado').value = ''; await loadEncargados(); }
  else { showMsg('msg-encargados', 'Error al añadir encargado', 'error'); }
  btn.disabled = false;
}

async function toggleEncargado(id, activo) {
  const res = await sbFetch(`encargados?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ activo }) });
  if (res.ok) { showMsg('msg-encargados', activo ? '✅ Encargado activado' : '✅ Encargado desactivado', 'success'); await loadEncargados(); }
  else { showMsg('msg-encargados', 'Error al actualizar encargado', 'error'); }
}

// ── MSG ──
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text; el.className = `msg ${type} show`;
  setTimeout(() => el.classList.remove('show'), 4000);
}
</script>
</body>
</html>
